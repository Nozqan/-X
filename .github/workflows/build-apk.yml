name: 🦂 AkrepIndirici v2.2.5Özkan Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: List APKs (Debug)
        run: find app/build/outputs/apk/ -name "*.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-v2.2.5Ozkan-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-v2.2.5Ozkan-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
