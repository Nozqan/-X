name: 🦂 AkrepIndirici APK Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:   # Manuel tetikleme için

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çek
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Java 17 kur (Gradle 8.4 + compileSdk 34 için gerekli)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Android SDK kur
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Gradle wrapper'a çalıştırma izni ver
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Gradle cache
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 6. Debug APK derle
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. APK bilgilerini göster
      - name: Show APK info
        run: |
          echo "=== APK Dosyaları ==="
          find . -name "*.apk" -type f
          echo ""
          echo "=== APK Boyutu ==="
          find . -name "*.apk" -type f -exec ls -lh {} \;

      # 8. Debug APK'yı artifact olarak yükle
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-v2.2-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-release-apk:
    name: Build Release APK (Unsigned)
    runs-on: ubuntu-latest
    needs: build-debug-apk

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK (Unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-v2.2-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
